<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LiquorApp - Registro</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 2rem; }
    form { max-width: 420px; display: grid; gap: .75rem; }
    label { font-weight: 600; }
    input { padding: .5rem; font-size: 1rem; }
    .error { color: #b00020; font-size: .9rem; }
    .ok { color: #05642c; }
    button[disabled] { opacity: .6; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Crear cuenta</h1>
  <form id="form">
    <div>
      <label for="firstName">Nombre</label>
      <input id="firstName" name="firstName" required maxlength="100" />
      <div class="error" data-error-for="firstName"></div>
    </div>
    <div>
      <label for="lastName">Apellido</label>
      <input id="lastName" name="lastName" required maxlength="100" />
      <div class="error" data-error-for="lastName"></div>
    </div>
    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required maxlength="256" />
      <div class="error" data-error-for="email"></div>
    </div>
    <div>
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required minlength="8" />
      <div class="error" data-error-for="password"></div>
    </div>
    <div>
      <label for="confirmPassword">Confirmar contraseña</label>
      <input id="confirmPassword" name="confirmPassword" type="password" required />
      <div class="error" data-error-for="confirmPassword"></div>
    </div>
    <button id="submit" type="submit" disabled>Registrarme</button>
  </form>
  <p id="result"></p>
  <script src="/app.js" type="module"></script>
</body>
</html>
